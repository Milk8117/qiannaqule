<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>钱去哪了企业版 - 帮你算公司最大的问题值多少钱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .logo-img {
      width: 220px;
      max-width: 70vw;
      margin-bottom: 6px;
    }
    .version-tag {
      display: inline-block;
      background: #ec7210;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 3px 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .tagline { font-size: 18px; color: rgba(255,255,255,0.75); margin-bottom: 36px; }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 380px;
      width: 100%;
      margin-bottom: 30px;
    }
    .card h2 { font-size: 22px; margin-bottom: 18px; color: #ec7210; }
    .card .step { display: flex; align-items: flex-start; margin-bottom: 14px; }
    .card .step-num {
      background: #ec7210;
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
      margin-right: 12px;
      margin-top: 2px;
    }
    .card .step-text { font-size: 17px; line-height: 1.7; color: rgba(255,255,255,0.9); text-align: left; }


    .sdk-hint-arrow {
      position: fixed;
      bottom: 80px;
      right: 28px;
      font-size: 28px;
      animation: bounce-down 1s ease-in-out infinite;
      z-index: 9999;
      pointer-events: none;
      filter: drop-shadow(0 2px 6px rgba(236,114,16,0.5));
    }
    @keyframes bounce-down {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(10px); opacity: 0.6; }
    }
    .hint { font-size: 15px; color: rgba(255,255,255,0.55); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    /* 隐藏推荐问题按钮，防止干扰客户按流程回答 */
    [class*="suggestion"], [class*="recommended"], [class*="quick-reply"],
    [class*="question-item"], [class*="prompt-item"] {
      display: none !important;
    }
    #chat-loading {
      display: inline-block;
      background: rgba(236,114,16,0.9); color: #fff;
      padding: 8px 20px; border-radius: 20px;
      font-size: 14px;
      animation: pulse 1.5s ease-in-out infinite;
      margin-top: 12px;
    }


    .wechat-qr {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 40px;
      opacity: 0.85;
    }
    .qr-img {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      border: 2px solid rgba(236,114,16,0.3);
    }
    .qr-text {
      margin-top: 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
    }
    .brand-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 120px;
      opacity: 0.5;
    }
    .brand-label {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }
    .brand-logo {
      height: 28px;
      width: auto;
    }
  </style>
</head>

    // 监听SDK聊天窗口状态，控制👇显隐
    (function() {
      var arrow = document.getElementById('sdk-hint-arrow');
      var observer = new MutationObserver(function() {
        // SDK聊天窗口打开时会有coze-chat-container之类的元素可见
        var chatContainer = document.querySelector('[class*="coze-chat"]') || 
                           document.querySelector('[class*="chat-container"]') ||
                           document.querySelector('iframe[title*="chat"]') ||
                           document.querySelector('[class*="webchat"]');
        if (arrow) {
          // 检查是否有可见的聊天面板（不是浮动按钮）
          var chatPanel = document.querySelector('[class*="chat-window"]') ||
                         document.querySelector('[class*="chat-panel"]') ||
                         document.querySelector('[class*="chat-view"]');
          if (chatPanel && chatPanel.offsetHeight > 0) {
            arrow.style.display = 'none';
          } else {
            arrow.style.display = 'block';
          }
        }
      });
      observer.observe(document.body, { childList: true, subtree: true, attributes: true });
    })();
  </script>
<div class="sdk-hint-arrow" id="sdk-hint-arrow">👇</div>
</body>
</html>
