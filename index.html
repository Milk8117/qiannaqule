    .tagline { font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 40px; }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 360px;
      width: 100%;
      margin-bottom: 30px;
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; color: #e94560; }
    .card .step { display: flex; align-items: flex-start; margin-bottom: 12px; }
    .card .step-num {
      background: #e94560;
      color: #fff;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      margin-right: 10px;
      margin-top: 2px;
    }
    .card .step-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.85); text-align: left; }
    .hint { font-size: 13px; color: rgba(255,255,255,0.5); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    .arrow { position: fixed; right: 20px; bottom: 90px; font-size: 24px; animation: bounce 1.5s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    #chat-loading {
      position: fixed; bottom: 30px; right: 30px;
      background: rgba(233,69,96,0.9); color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 14px; z-index: 9999;
      animation: pulse 1.5s ease-in-out infinite;

  <div class="logo">钱去哪了<span>？</span></div>

  <div class="card">

    <div class="step"><div class="step-num">1</div><div class="step-text">点击右下角的对话图标</div></div>
    <div class="step"><div class="step-num">2</div><div class="step-text">告诉我你所在的行业</div></div>
    <div class="step"><div class="step-num">3</div><div class="step-text">回答4个关键问题，获得精准诊断</div></div>
    <div class="step"><div class="step-num">4</div><div class="step-text">拿到你的痛点标价报告</div></div>
  </div>

      // === Visitor ID for session isolation ===
      function getVisitorId() {
        var vid = localStorage.getItem('qnal_vid');
        if (!vid) {
          vid = 'v_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          localStorage.setItem('qnal_vid', vid);
        }
        return vid;
      }

      // === Sign JWT with RS256 ===
      function signJWT(sessionName) {
        var header = { alg: 'RS256', typ: 'JWT', kid: KID };
        var now = Math.floor(Date.now() / 1000);
        var payload = {
          iss: ISS,
          aud: 'api.coze.cn',
          iat: now,
          exp: now + 3600,
          jti: Math.random().toString(36).substr(2) + Date.now().toString(36),
          session_name: sessionName
        };
        return KJUR.jws.JWS.sign('RS256', JSON.stringify(header), JSON.stringify(payload), PRIVATE_KEY);
      }

      // === Exchange JWT for OAuth access token ===
      async function getAccessToken(jwt) {
        var resp = await fetch('https://api.coze.cn/api/permission/oauth2/token', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + jwt,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer',
            duration_seconds: 86399
          })
        });
        var json = await resp.json();
        var token = json.access_token || (json.data && json.data.access_token);
        if (!token) {
          console.error('Token exchange failed:', json);
          throw new Error('No access token: ' + (json.msg || JSON.stringify(json)));
        }
        return token;
      }

      // === Initialize Chat SDK ===
      try {
        var visitorId = getVisitorId();
        var jwt = signJWT(visitorId);
        var accessToken = await getAccessToken(jwt);

        document.getElementById('chat-loading').style.display = 'none';

        new CozeWebSDK.WebChatClient({
          config: {
            type: 'bot',
            bot_id: BOT_ID,
          },
          auth: {
            type: 'token',
            token: accessToken,
            onRefreshToken: async function() {
              var newJwt = signJWT(visitorId);
              return await getAccessToken(newJwt);
            },
          },
          userInfo: {
            id: visitorId,
            url: 'https://lf-coze-web-cdn.coze.cn/obj/eden-cn/lm-lgvj/ljhwZthlaukjlkulzlp/coze/coze-logo.png',
            nickname: '客户',
          },
          ui: {
            base: {
              icon: 'https://lf-coze-web-cdn.coze.cn/obj/eden-cn/lm-lgvj/ljhwZthlaukjlkulzlp/coze/chatsdk-logo.png',
              layout: 'mobile',
              lang: 'zh-CN',
              zIndex: 1000,
            },
            header: { isShow: true, isNeedClose: true },
            asstBtn: { isNeed: true },
            footer: { isShow: true, expressionText: '钱去哪了 · 让问题有标价' },
            chatBot: { title: '钱去哪了', uploadable: false, width: 390 },
          },
        });
      } catch (error) {
        console.error('Chat SDK init failed:', error);
        var loadEl = document.getElementById('chat-loading');
        loadEl.textContent = '❌ 连接失败，请刷新重试';
        loadEl.style.animation = 'none';
      }
    })();
