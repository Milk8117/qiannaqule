  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .logo { font-size: 36px; font-weight: 800; margin-bottom: 8px; letter-spacing: 2px; }
    .logo span { color: #e94560; }
    .tagline { font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 40px; }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 360px;
      width: 100%;
      margin-bottom: 30px;
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; color: #e94560; }
    .card p { font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.85); margin-bottom: 10px; }
    .card .step { display: flex; align-items: flex-start; margin-bottom: 12px; }
    .card .step-num {
      background: #e94560;
      color: #fff;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      margin-right: 10px;
      margin-top: 2px;
    }
    .card .step-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.85); text-align: left; }
    .hint {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .arrow {
      position: fixed;
      right: 20px;
      bottom: 90px;
      font-size: 24px;
      animation: bounce 1.5s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
