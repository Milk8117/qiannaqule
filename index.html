<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>钱去哪了企业版 - 帮你算公司最大的问题值多少钱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .logo-img {
      width: 220px;
      max-width: 70vw;
      margin-bottom: 6px;
    }
    .version-tag {
      display: inline-block;
      background: #ec7210;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 3px 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .tagline { font-size: 18px; color: rgba(255,255,255,0.75); margin-bottom: 36px; }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 380px;
      width: 100%;
      margin-bottom: 30px;
    }
    .card h2 { font-size: 22px; margin-bottom: 18px; color: #ec7210; }
    .card .step { display: flex; align-items: flex-start; margin-bottom: 14px; }
    .card .step-num {
      background: #ec7210;
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
      margin-right: 12px;
      margin-top: 2px;
    }
    .card .step-text { font-size: 17px; line-height: 1.7; color: rgba(255,255,255,0.9); text-align: left; }
    .card .step-highlight {
      background: rgba(236,114,16,0.15);
      border: 1px solid rgba(236,114,16,0.4);
      border-radius: 8px;
      padding: 6px 10px;
      margin: -4px -10px;
    }
    .hint { font-size: 15px; color: rgba(255,255,255,0.55); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    .arrow { position: fixed; right: 20px; bottom: 90px; font-size: 28px; animation: bounce 1.5s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    /* 隐藏推荐问题按钮，防止干扰客户按流程回答 */
    [class*="suggestion"], [class*="recommended"], [class*="quick-reply"],
    [class*="question-item"], [class*="prompt-item"] {
      display: none !important;
    }
    #chat-loading {
      position: fixed; bottom: 30px; right: 30px;
      background: rgba(236,114,16,0.9); color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 14px; z-index: 9999;
      animation: pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>

      // === Visitor ID for session isolation ===
      function getVisitorId() {
        var vid = localStorage.getItem('qnal_vid');
        if (!vid) {
          vid = 'v_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          localStorage.setItem('qnal_vid', vid);
        }
        return vid;
      }

      // === Sign JWT with RS256 ===
      function signJWT(sessionName) {
        var header = { alg: 'RS256', typ: 'JWT', kid: KID };
        var now = Math.floor(Date.now() / 1000);
        var payload = {
          iss: ISS,
          aud: 'api.coze.cn',
          iat: now,
          exp: now + 3600,
          jti: Math.random().toString(36).substr(2) + Date.now().toString(36),
          session_name: sessionName
        };
        return KJUR.jws.JWS.sign('RS256', JSON.stringify(header), JSON.stringify(payload), PRIVATE_KEY);
      }

      // === Exchange JWT for OAuth access token ===
      async function getAccessToken(jwt) {
        var resp = await fetch('https://api.coze.cn/api/permission/oauth2/token', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + jwt,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer',
            duration_seconds: 86399
          })
        });
        var json = await resp.json();
        var token = json.access_token || (json.data && json.data.access_token);
        if (!token) {
          console.error('Token exchange failed:', json);
          throw new Error('No access token: ' + (json.msg || JSON.stringify(json)));
        }
        return token;
      }

      // === Initialize Chat SDK ===
      try {
        var visitorId = getVisitorId();
        var jwt = signJWT(visitorId);
        var accessToken = await getAccessToken(jwt);

        document.getElementById('chat-loading').style.display = 'none';

        new CozeWebSDK.WebChatClient({
          config: {
            type: 'bot',
            bot_id: BOT_ID,
          },
          auth: {
            type: 'token',
            token: accessToken,
            onRefreshToken: async function() {
              var newJwt = signJWT(visitorId);
              return await getAccessToken(newJwt);
            },
          },
          userInfo: {
            id: visitorId,
            url: 'https://lf-coze-web-cdn.coze.cn/obj/eden-cn/lm-lgvj/ljhwZthlaukjlkulzlp/coze/coze-logo.png',
            nickname: '客户',
          },
          ui: {
            base: {
              icon: 'https://lf-coze-web-cdn.coze.cn/obj/eden-cn/lm-lgvj/ljhwZthlaukjlkulzlp/coze/chatsdk-logo.png',
              layout: 'mobile',
              lang: 'zh-CN',
              zIndex: 1000,
            },
            header: { isShow: true, isNeedClose: true },
            asstBtn: { isNeed: true },
            footer: { isShow: true, expressionText: '钱去哪了企业版 · 让问题有标价' },
            chatBot: { title: '钱去哪了企业版', uploadable: false, width: 390 },
          },
        });
      } catch (error) {
        console.error('Chat SDK init failed:', error);
        var loadEl = document.getElementById('chat-loading');
        loadEl.textContent = '❌ 连接失败，请刷新重试';
        loadEl.style.animation = 'none';
      }
    })();
