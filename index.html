<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>钱去哪了企业版 - 帮你算公司最大的问题值多少钱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .logo-img {
      width: 220px;
      max-width: 70vw;
      margin-bottom: 6px;
    }
    .version-tag {
      display: inline-block;
      background: #ec7210;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 3px 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .tagline { font-size: 18px; color: rgba(255,255,255,0.75); margin-bottom: 36px; }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 380px;
      width: 100%;
      margin-bottom: 30px;
    }
    .card h2 { font-size: 22px; margin-bottom: 18px; color: #ec7210; }
    .card .step { display: flex; align-items: flex-start; margin-bottom: 14px; }
    .card .step-num {
      background: #ec7210;
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
      margin-right: 12px;
      margin-top: 2px;
    }
    .card .step-text { font-size: 17px; line-height: 1.7; color: rgba(255,255,255,0.9); text-align: left; }
    .card .step-highlight {
      background: rgba(236,114,16,0.15);
      border: 1px solid rgba(236,114,16,0.4);
      border-radius: 8px;
      padding: 6px 10px;
      margin: -4px -10px;
    }
    .hint { font-size: 15px; color: rgba(255,255,255,0.55); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    .arrow { position: fixed; right: 20px; bottom: 90px; font-size: 28px; animation: bounce 1.5s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    /* 隐藏推荐问题按钮，防止干扰客户按流程回答 */
    [class*="suggestion"], [class*="recommended"], [class*="quick-reply"],
    [class*="question-item"], [class*="prompt-item"] {
      display: none !important;
    }
    #chat-loading {
      position: fixed; bottom: 30px; right: 30px;
      background: rgba(236,114,16,0.9); color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 14px; z-index: 9999;
      animation: pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
